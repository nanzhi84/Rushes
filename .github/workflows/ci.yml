name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Run Ruff lint
        run: uv run ruff check

      - name: Check Ruff formatting
        run: uv run ruff format --check

      - name: Run mypy
        run: uv run mypy

      - name: Run pytest
        run: uv run pytest
