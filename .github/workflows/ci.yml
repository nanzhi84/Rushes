name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION_FILE: go/go.mod
  PNPM_VERSION: 10.13.1

jobs:
  go-test:
    name: Go test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: go/go.sum
      - name: Install ffmpeg and aubio (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.sources /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update
          sudo apt-get install -y ffmpeg aubio-tools
      - name: Install ffmpeg and aubio (macOS)
        if: runner.os == 'macOS'
        run: |
          brew list ffmpeg-full >/dev/null 2>&1 || brew install ffmpeg-full
          echo "$(brew --prefix ffmpeg-full)/bin" >> "$GITHUB_PATH"
          brew list aubio >/dev/null 2>&1 || brew install aubio
      - name: Test with race detector
        working-directory: go
        run: go test -race ./...

  go-quality:
    name: Go quality, contracts and coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: go/go.sum
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install ffmpeg and aubio
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.sources /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update
          sudo apt-get install -y ffmpeg aubio-tools
      - name: Install web dependencies for contract generation
        run: pnpm --dir apps/web install --frozen-lockfile
      - name: Verify generated contracts and SSE golden frames
        run: bash scripts/check_go_contracts.sh
      - name: Go vet
        working-directory: go
        run: go vet ./...
      - name: Compile and vet integration-tagged tests
        run: make vet-integration
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: go
          args: --timeout=5m
      - name: Verify depguard rejects a forbidden import
        working-directory: go
        run: |
          fixture=internal/contracts/depguard_negative_fixture.go
          trap 'rm -f "$fixture"' EXIT
          cat > "$fixture" <<'EOF'
          package contracts

          import _ "github.com/nanzhi84/Rushes/go/internal/storage"
          EOF
          set +e
          output=$(golangci-lint run --timeout=5m --enable-only=depguard ./internal/contracts 2>&1)
          status=$?
          set -e
          printf '%s\n' "$output"
          if [[ $status -eq 0 ]]; then
            echo "depguard did not reject the injected forbidden import"
            exit 1
          fi
          for needle in depguard_negative_fixture.go depguard internal/storage; do
            if ! grep -F "$needle" <<<"$output" >/dev/null; then
              echo "depguard self-check failed for an unrelated reason: missing $needle"
              exit 1
            fi
          done
      - name: Generate race-enabled coverage profile
        run: bash scripts/check_go_coverage.sh
      - name: Enforce 90 percent coverage
        uses: vladopajic/go-test-coverage@v2
        with:
          config: ./.testcoverage.yml
      - name: Scan Go dependencies
        working-directory: go
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...

  web:
    name: Web typecheck, test and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm --dir apps/web install --frozen-lockfile
      - run: pnpm --dir apps/web typecheck
      - run: pnpm --dir apps/web test -- --run
      - run: pnpm --dir apps/web build
      - name: Enforce web bundle budget
        run: pnpm --dir apps/web run check:bundle

  e2e:
    name: Playwright against Go API and worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: go/go.sum
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            apps/web/pnpm-lock.yaml
            e2e/pnpm-lock.yaml
      - name: Install ffmpeg and aubio
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.sources /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update
          sudo apt-get install -y ffmpeg aubio-tools
      - run: pnpm --dir apps/web install --frozen-lockfile
      - run: pnpm --dir e2e install --frozen-lockfile
      - run: pnpm --dir e2e exec playwright install chromium --with-deps
      - run: make PNPM=pnpm e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
