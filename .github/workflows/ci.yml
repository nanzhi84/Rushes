name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Sync dependencies
        run: uv sync

      - name: Run Ruff lint
        run: uv run ruff check

      - name: Check Ruff formatting
        run: uv run ruff format --check

      - name: Run mypy
        run: uv run mypy

      - name: Run pytest
        run: uv run pytest

      - name: Check PRD contracts
        run: uv run python scripts/check_contracts.py

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Typecheck web
        run: pnpm typecheck

      - name: Test web
        run: pnpm test -- --run

      - name: Build web
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Sync Python dependencies
        run: uv sync

      - name: Install web dependencies
        run: pnpm --dir apps/web install --frozen-lockfile || pnpm --dir apps/web install

      - name: Install E2E dependencies
        run: pnpm --dir e2e install

      - name: Install Playwright Chromium
        run: pnpm --dir e2e exec playwright install chromium --with-deps

      - name: Run Playwright E2E
        run: pnpm --dir e2e exec playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
